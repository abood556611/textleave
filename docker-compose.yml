version: '3.8'

services:
  # TextLeaf web application
  textleaf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: textleaf-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - OXAPAY_API_KEY=${OXAPAY_API_KEY:-}
      - OXAPAY_MERCHANT_ID=${OXAPAY_MERCHANT_ID:-}
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER:-+963958917677}
      - APP_URL=${APP_URL:-http://localhost:8000}
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./static/backgrounds:/app/static/backgrounds
      - ./static/audio:/app/static/audio
      - ./textleaf.db:/app/textleaf.db
    networks:
      - textleaf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy (optional but recommended)
  nginx:
    image: nginx:alpine
    container_name: textleaf-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - textleaf
    networks:
      - textleaf-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  textleaf-network:
    driver: bridge
